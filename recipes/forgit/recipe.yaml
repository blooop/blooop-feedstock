schema_version: 1

package:
  name: forgit
  version: "26.01.0"

source:
  url: https://github.com/wfxr/forgit/releases/download/26.01.0/forgit-26.01.0.tar.gz
  sha256: df16e3ca5da44724d2712f26e6df3190c43fa35e0f6d0e48da055fa426f9aa36

build:
  number: 0
  noarch: generic
  script:
    - mkdir -p "$PREFIX/bin"
    - install -Dm755 bin/git-forgit "$PREFIX/bin/git-forgit"
    # Shell plugin files
    - mkdir -p "$PREFIX/share/forgit"
    - cp forgit.plugin.zsh "$PREFIX/share/forgit/"
    - cp forgit.plugin.sh "$PREFIX/share/forgit/"
    # Fish plugin
    - mkdir -p "$PREFIX/share/forgit/conf.d"
    - cp conf.d/forgit.plugin.fish "$PREFIX/share/forgit/conf.d/"
    # Bash completion
    - mkdir -p "$PREFIX/share/bash-completion/completions"
    - cp completions/git-forgit.bash "$PREFIX/share/bash-completion/completions/git-forgit"
    # Zsh completion
    - mkdir -p "$PREFIX/share/zsh/site-functions"
    - cp completions/_git-forgit "$PREFIX/share/zsh/site-functions/_git-forgit"
    # Fish completion
    - mkdir -p "$PREFIX/share/fish/vendor_completions.d"
    - cp completions/git-forgit.fish "$PREFIX/share/fish/vendor_completions.d/git-forgit.fish"

requirements:
  run:
    - fzf >=0.49.0
    - git

tests:
  - script:
      - which git-forgit
      - test -x $PREFIX/bin/git-forgit
      - test -f $PREFIX/share/forgit/forgit.plugin.zsh
      - test -f $PREFIX/share/forgit/forgit.plugin.sh
      - test -f $PREFIX/share/bash-completion/completions/git-forgit
      - test -f $PREFIX/share/zsh/site-functions/_git-forgit

about:
  homepage: https://github.com/wfxr/forgit
  license: MIT
  license_family: MIT
  summary: A utility tool powered by fzf for using git interactively
  description: |
    forgit is a utility tool powered by fzf for using git interactively.
    It provides interactive versions of many git commands including log,
    diff, add, reset, stash, clean, cherry-pick, rebase, fixup, and more.
    It can be used as a git subcommand (git forgit) or sourced as a shell
    plugin for convenient aliases.
  documentation: https://github.com/wfxr/forgit#readme
  repository: https://github.com/wfxr/forgit

extra:
  recipe-maintainers:
    - blooop
