schema_version: 1

package:
  name: claude-shim
  version: "0.6.2"

source:
  - path: claude-shim.sh
  - path: cld.sh
  - path: cldr.sh

build:
  number: 0
  script:
    - mkdir -p $PREFIX/bin
    - cp $SRC_DIR/claude-shim.sh $PREFIX/bin/claude
    - cp $SRC_DIR/cld.sh $PREFIX/bin/cld
    - cp $SRC_DIR/cldr.sh $PREFIX/bin/cldr
    - chmod +x $PREFIX/bin/claude $PREFIX/bin/cld $PREFIX/bin/cldr

requirements:
  run: []

tests:
  - script:
      - if: unix
        then:
          - which claude
          - which cld
          - which cldr
          - test -x $PREFIX/bin/claude
          - test -x $PREFIX/bin/cld
          - test -x $PREFIX/bin/cldr
          - bash -n $PREFIX/bin/claude  # syntax check
          - bash -n $PREFIX/bin/cld
          - bash -n $PREFIX/bin/cldr
      - if: win
        then:
          - where claude
          - where cld
          - where cldr

about:
  homepage: https://claude.ai/
  license: LicenseRef-Proprietary
  license_family: Proprietary
  summary: Claude Code installer shim - ensures Claude Code CLI is installed and runs it
  description: |
    This package provides a shim that ensures the official Claude Code CLI from
    Anthropic is installed, then runs it. It exposes the following commands:
    - 'claude' - the main Claude Code CLI
    - 'cld' - shortcut for 'claude --dangerously-skip-permissions'
    - 'cldr' - shortcut for 'claude --dangerously-skip-permissions --resume'

    Behavior:
    - If Claude is already installed (~/.local/bin/claude), the shim runs it directly.
    - Otherwise, it installs Claude Code via the official installer (claude.ai/install.sh).
    - Claude Code handles its own auto-updates after installation.

    This package does NOT redistribute Claude Code. It uses Anthropic's official
    installer script.
  documentation: https://docs.anthropic.com/en/docs/claude-code
  repository: https://github.com/anthropics/claude-code

extra:
  recipe-maintainers:
    - blooop
